<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Pacifico&display=swap" rel="stylesheet">
    <title>SFT with Sethiya</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><span id="sft">SFT</span>with<span id="sethiya">Sethiya</span></div>
            <ul>
                <li><a href="#home" class="active">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section>
        <div class="home-container">
            <div class="">
                <p id="name">Sethiya Wishvamith</p>
                <p id="degree">BET (Hons) in instrumentation and automation <br>University of Colombo (UG)</p>
                <hr>
                <div id="edu-level">
                    <div class="type-line-1">ADVANCED LEVEL</div>
                    <div class="type-line-2">SCIENCE FOR TECHNOLOGY</div>
                </div>
            </div>
            <div>
                <img src="./images/profile-photo.jpg" alt="profile-photo">
            </div>
        </div>
    </section>
    <script>
        const navLinks = document.querySelectorAll('nav ul li a');
        
        navLinks.forEach(link => {
            link.addEventListener('click', function() {
                // Remove active class from all links
                navLinks.forEach(l => l.classList.remove('active'));
                // Add active class to the clicked link
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
